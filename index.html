<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>Science Score Portal ⚛️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Kanit&display=swap');
    body {
      font-family: 'Kanit', sans-serif;
      background: radial-gradient(circle at top left, #e0f7fa, #fff);
      margin: 0; padding: 0;
      color: #004d40;
    }
    header {
      background: linear-gradient(90deg, #004d40, #00796b);
      color: white;
      padding: 25px 15px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0, 77, 64, 0.5);
    }
    h1 {
      margin: 0;
      font-size: 32px;
      letter-spacing: 2px;
      font-weight: 700;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    }
    .container { max-width: 1000px; margin: 30px auto 60px; padding: 0 15px; }
    section {
      background: #ffffffdd;
      padding: 25px 30px 30px;
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      margin-bottom: 40px;
      transition: box-shadow 0.3s ease;
    }
    section:hover { box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
    section h2 {
      color: #00796b;
      margin-bottom: 20px;
      font-weight: 700;
      font-size: 26px;
      border-left: 6px solid #00796b;
      padding-left: 12px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    input, button, select {
      padding: 12px 14px;
      font-size: 17px;
      border-radius: 8px;
      border: 1.8px solid #00796b;
      outline-offset: 2px;
      box-sizing: border-box;
      color: #004d40;
    }
    input, select { width: 100%; }
    button {
      background-color: #00796b;
      color: white;
      border: none;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 12px #004d40aa;
      min-width: 120px;
    }
    button:hover {
      background-color: #004d40;
      box-shadow: 0 6px 15px #00332dcc;
    }
    button:disabled {
      background-color: #8fb6b0;
      cursor: default;
      box-shadow: none;
    }
    .result-box {
      background: #f1f8e9;
      padding: 18px 20px;
      border-radius: 10px;
      margin-top: 12px;
      white-space: pre-line;
      font-size: 16px;
      font-weight: 600;
      color: #33691e;
      box-shadow: inset 0 2px 5px #c6e2a3;
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 25px;
      table-layout: fixed;
      word-wrap: break-word;
      box-shadow: 0 4px 18px #00796b33;
      border-radius: 10px;
      overflow: hidden;
    }
    .admin-table th, .admin-table td {
      border: 1.5px solid #00796b;
      padding: 12px 14px;
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      background: #e0f2f1;
      color: #004d40;
    }
    .admin-table td {
      background: #fafafa;
      color: #004d40dd;
      font-weight: 500;
    }
    .topic-section {
      margin-top: 30px;
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
      gap: 18px 24px;
      align-items: center;
    }
    #adminPanel { display: none; }
    .filter-section {
      display: flex;
      flex-wrap: wrap;
      gap: 18px 20px;
      align-items: center;
      margin-top: 20px;
      margin-bottom: 15px;
      justify-content: flex-start;
    }
    .filter-section select, .filter-section button {
      width: auto;
      min-width: 160px;
      max-width: 250px;
    }
    .filter-section button { padding: 12px 26px; }
    @media (max-width: 800px) {
      .topic-section { grid-template-columns: 1fr 1fr; }
      .filter-section { justify-content: center; }
    }
    @media (max-width: 480px) {
      .topic-section { grid-template-columns: 1fr; }
      .filter-section select, .filter-section button {
        width: 100%; max-width: none;
      }
    }
  </style>
</head>
<body>
<header>
  <h1>🔬 Science Score Portal</h1>
  <p>ระบบดูแลและจัดการคะแนนวิทยาศาสตร์สำหรับครูและนักเรียน</p>
</header>
<div class="container">
  <section>
    <h2>👩‍🔬 นักเรียนตรวจสอบคะแนน</h2>
    <input type="text" id="studentID" placeholder="รหัสนักเรียน" />
    <input type="text" id="subjectTopic" placeholder="ชื่อหัวข้อ" />
    <button onclick="checkScore()">ดูคะแนน</button>
    <div id="studentResult" class="result-box"></div>
  </section>

  <section>
    <h2>🔐 เข้าสู่ระบบครู</h2>
    <input type="password" id="adminPassword" placeholder="รหัสผ่านครู" />
    <button onclick="showAdminPanel()">เข้าสู่ระบบ</button>
  </section>

  <section id="adminPanel">
    <h2>👨‍🏫 ครูจัดการข้อมูลคะแนน</h2>
    <div class="topic-section">
      <input type="text" id="inputID" placeholder="รหัสนักเรียน" />
      <input type="text" id="inputName" placeholder="ชื่อนักเรียน" />
      <input type="text" id="inputLastName" placeholder="นามสกุล" />
      <input type="text" id="inputTopic" placeholder="หัวข้อวิชา" />
      <input type="number" id="inputScore" placeholder="คะแนน" />
      <input type="number" id="inputMaxScore" placeholder="คะแนนเต็ม" />
      <input type="text" id="inputClassroom" placeholder="ชั้นและห้อง เช่น ม.4ห้อง1" />
      <button onclick="addOrUpdateScore()">เพิ่ม / แก้ไขคะแนน</button>
      <button onclick="removeScore()">ลบคะแนน</button>
      <div id="adminMsg" class="result-box"></div>
    </div>
    <div class="filter-section">
      <select id="filterTopic" onchange="renderTable()">
        <option value="">-- เลือกวิชา --</option>
      </select>
      <select id="filterClassroom" onchange="renderTable()">
        <option value="">-- เลือกชั้น/ห้อง --</option>
      </select>
      <button onclick="resetFilters()">รีเซ็ตตัวกรอง</button>
    </div>
    <table class="admin-table" id="scoreTable">
      <thead>
        <tr>
          <th>รหัส</th>
          <th>ชื่อ-นามสกุล</th>
          <th>ชั้น/ห้อง</th>
          <th>หัวข้อ</th>
          <th>คะแนน</th>
          <th>คะแนนเต็ม</th>
        </tr>
      </thead>
      <tbody id="scoreBody"></tbody>
    </table>
  </section>
</div>

<script>
  const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbxYdLINbAk_CdJS-GOSecauVY87pUoYI519BbVgQkAoy-K5O9r3giX5A_IUiHMt3v0B/exec";
  const ADMIN_PASS = "Thanyathep082";
  let scoreData = {};

  async function fetchScores() {
    try {
      const res = await fetch(SHEET_API_URL);
      const json = await res.json();
      if (json.success && Array.isArray(json.data)) {
        scoreData = {};
        for (const row of json.data) {
          const { id, name, lastName, classroom, topic, score, maxScore } = row;
          if (!scoreData[id]) {
            scoreData[id] = { name, lastName, classroom, topics: {} };
          }
          scoreData[id].topics[topic] = {
            score: parseInt(score),
            maxScore: parseInt(maxScore)
          };
        }
        populateFilterOptions();
        renderTable();
      }
    } catch (err) {
      alert("โหลดข้อมูลไม่สำเร็จ");
    }
  }

  function checkScore() {
    const id = document.getElementById("studentID").value.trim();
    const topic = document.getElementById("subjectTopic").value.trim();
    const result = document.getElementById("studentResult");

    if (!scoreData[id]) return result.innerText = "ไม่พบรหัสนี้ในระบบ";
    const student = scoreData[id];
    if (!student.topics[topic]) return result.innerText = `ไม่พบคะแนนของ ${student.name} ${student.lastName} ในหัวข้อ ${topic}`;
    const { score, maxScore } = student.topics[topic];
    result.innerText = `ชื่อ-นามสกุล: ${student.name} ${student.lastName}\nชั้น/ห้อง: ${student.classroom}\nหัวข้อ: ${topic}\nคะแนน: ${score} / ${maxScore}`;
  }

  function showAdminPanel() {
    const pass = document.getElementById("adminPassword").value;
    if (pass !== ADMIN_PASS) return alert("รหัสผ่านไม่ถูกต้อง");
    document.getElementById("adminPanel").style.display = "block";
    populateFilterOptions();
    renderTable();
  }

  async function addOrUpdateScore() {
    const id = document.getElementById("inputID").value.trim();
    const name = document.getElementById("inputName").value.trim();
    const lastName = document.getElementById("inputLastName").value.trim();
    const classroom = document.getElementById("inputClassroom").value.trim();
    const topic = document.getElementById("inputTopic").value.trim();
    const score = parseInt(document.getElementById("inputScore").value);
    const maxScore = parseInt(document.getElementById("inputMaxScore").value);

    if (!id || !name || !lastName || !classroom || !topic || isNaN(score) || isNaN(maxScore)) {
      alert("โปรดกรอกข้อมูลให้ครบทุกช่อง");
      return;
    }

    const res = await fetch(SHEET_API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "update", id, name, lastName, classroom, topic, score, maxScore })
    });
    const json = await res.json();
    document.getElementById("adminMsg").innerText = json.success
      ? `บันทึกคะแนนของ ${name} ${lastName} เรียบร้อยแล้ว`
      : "เกิดข้อผิดพลาด";
    fetchScores();
  }

  async function removeScore() {
    const id = document.getElementById("inputID").value.trim();
    const topic = document.getElementById("inputTopic").value.trim();
    if (!id || !topic) return alert("กรุณากรอก รหัสนักเรียน และ หัวข้อ");

    const res = await fetch(SHEET_API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "delete", id, topic })
    });
    const json = await res.json();
    document.getElementById("adminMsg").innerText = json.success
      ? `ลบคะแนนหัวข้อ ${topic} ของนักเรียนรหัส ${id} แล้ว`
      : "ไม่พบข้อมูลที่จะลบ";
    fetchScores();
  }

  function populateFilterOptions() {
    const topicSet = new Set(), classroomSet = new Set();
    for (const id in scoreData) {
      classroomSet.add(scoreData[id].classroom);
      for (const topic in scoreData[id].topics) topicSet.add(topic);
    }
    fillOptions("filterTopic", topicSet);
    fillOptions("filterClassroom", classroomSet);
  }

  function fillOptions(id, values) {
    const sel = document.getElementById(id);
    const current = sel.value;
    sel.innerHTML = `<option value="">-- เลือก${id.includes("Topic") ? "วิชา" : "ชั้น/ห้อง"} --</option>`;
    Array.from(values).sort().forEach(v => {
      const opt = document.createElement("option");
      opt.value = v;
      opt.textContent = v;
      sel.appendChild(opt);
    });
    if (Array.from(sel.options).some(o => o.value === current)) sel.value = current;
  }

  function renderTable() {
    const tbody = document.getElementById("scoreBody");
    const filterTopic = document.getElementById("filterTopic").value;
    const filterClassroom = document.getElementById("filterClassroom").value;
    tbody.innerHTML = "";

    let count = 0;
    for (const id in scoreData) {
      const s = scoreData[id];
      if (filterClassroom && s.classroom !== filterClassroom) continue;
      for (const topic in s.topics) {
        if (filterTopic && topic !== filterTopic) continue;
        const { score, maxScore } = s.topics[topic];
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${id}</td>
          <td>${s.name} ${s.lastName}</td>
          <td>${s.classroom}</td>
          <td>${topic}</td>
          <td>${score}</td>
          <td>${maxScore}</td>`;
        tbody.appendChild(row);
        count++;
      }
    }
    if (count === 0) {
      tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; font-style:italic; color:#666;">ไม่พบข้อมูลตามตัวกรอง</td></tr>`;
    }
  }

  function resetFilters() {
    document.getElementById("filterTopic").value = "";
    document.getElementById("filterClassroom").value = "";
    renderTable();
  }

  window.onload = fetchScores;
</script>
</body>
</html>
